name: execute
description: Execute a remote script
inputs:
  host:
    description: 'SSH hostname'
    required: true
  user:
    description: 'SSH user'
    required: true
  commands:
    description: 'commands to run'
    required: true
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        ssh ${{ inputs.user }}@${{ inputs.host }} ${{ inputs.commands }}
