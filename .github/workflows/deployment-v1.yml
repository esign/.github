name: Deployment

on:
  workflow_call:
    inputs:
      remote_project_folder:
        required: true
        type: string
      post_deploy_script:
        required: false
        type: string
      ssh_host:
        required: true
        type: string
      ssh_user:
        required: true
        type: string
      branch:
        required: true
        type: string
      github_sha:
        required: false
        type: string
      path_in_repository:
        required: false
        type: string
        default: '.'
    secrets:
      SSH_PRIVATE_KEY:
        required: true
      KNOWN_HOSTS:
        required: true

jobs:
  deployment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch ${{ inputs.branch }}
        uses: actions/checkout@v2
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
      - name: Determine local branch name & commit SHA
        run: |
          if [ ! -z "${{ inputs.github_sha }}" ]
          then
            echo "deploy_sha=${{ inputs.github_sha }}" >> $GITHUB_ENV
          else
            echo "deploy_sha=${{ github.sha }}" >> $GITHUB_ENV
          fi
          echo "local_branch_name=${{ github.run_id }}-${{ github.run_number }}" >> $GITHUB_ENV
      - name: "Checkout ${{ inputs.branch }} at commit ${{ env.deploy_sha }}"
        run: |
          git checkout ${{ env.deploy_sha }}
      - name: Log revision
        run: |
          commit=$(git rev-parse HEAD)
          echo "::notice::commit $commit"
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          name: id_rsa
          known_hosts: ${{ secrets.KNOWN_HOSTS }}
      - name: Create remote project folder if it doesn't exist
        env:
          TARGET_PATH: "/"
          TARGET_SCRIPT: "mkdir -p ${{ inputs.remote_project_folder }}; true"
        uses: esign/.github/.github/actions/execute@master
        with:
          host: ${{ inputs.ssh_host }}
          user: ${{ inputs.ssh_user }}
          target_path: ${{ env.TARGET_PATH }}
          target_script: ${{ env.TARGET_SCRIPT }}
      - name: "Upload local '${{ inputs.path_in_repository }}' to remote '${{ inputs.remote_project_folder }}'"
        uses: burnett01/rsync-deployments@5.2
        with:
          switches: -azr --exclude '*.git*' --exclude "vendor" --exclude "node_modules" --exclude "resources/cache" --delete
          path: ${{ inputs.path_in_repository }}
          remote_path: ${{ inputs.remote_project_folder }}
          remote_host: ${{ inputs.ssh_host }}
          remote_user: ${{ inputs.ssh_user }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
